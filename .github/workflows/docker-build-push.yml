name: Docker Build & Push

on:
  push:
    branches:
      - "**"        # triggers on every commit to every branch

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/python-docker--ci-pipeline

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-platform support (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx (required for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Generate image tags: branch-name + short commit SHA
      - name: Generate tags
        id: tags
        run: |
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "TAG=${BRANCH}-${SHA}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${BRANCH}-${SHA}"

      # 6. Build and push with layer caching + multi-platform
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Print image digest for traceability
      - name: Image digest
        run: echo "Pushed image digest → ${{ steps.build-and-push.outputs.digest }}"